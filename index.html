<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Native Barcode Scanner</title>
<style>


body {
  padding-bottom: 80px; /* prevents overlap */
  margin: 0;
  font-family: system-ui, Arial, sans-serif;
  background: black;
  color: white;
}

/* Title */
h2 {
  text-align: center;
  margin: 10px;
  font-size: 1.5rem;
}

/* CAMERA */
video {
  width: 100%;
  height: 50vh;
  object-fit: cover;
}

/* RESULT */
.card {
  text-align: center;
  font-size: 2.2rem;
  padding: 25px;
  font-weight: bold;
  transition: 0.2s;
}

/* STATUS */
#status {
  text-align: center;
  opacity: 0.7;
  margin-bottom: 10px;
}

/* STATS */
.stats {
  display: flex;
  justify-content: space-around;
  padding: 10px;
}

.stat {
  font-size: 1.1rem;
  font-weight: bold;
}

/* COLORS */
.accepted { color: #22c55e; }
.used { color: #f59e0b; }
.invalid { color: #ef4444; }

/* BOTTOM BAR */
.controls {
  position: fixed;
  bottom: 0;
  width: 100%;
  display: flex;
}

button {
  flex: 1;
  padding: 18px;
  font-size: 1.1rem;
  border: none;
  font-weight: bold;
}

/* Button colors */
#startBtn { background: #22c55e; color: black; }
#stopBtn { background: #ef4444; color: white; }
#modeBtn { background: #3b82f6; color: white; }
</style>
</head>

<body>

<h2>🎟 Barcode Scanner</h2>




<video id="video" autoplay></video>

<div id="result" class="card">Waiting...</div>
<div id="status"></div>

<div class="stats">
  <div class="stat accepted">✅ Accepted: <span id="accepted">0</span></div>
  <div class="stat used">⚠️ Used: <span id="used">0</span></div>
  <div class="stat invalid">❌ Not invited: <span id="invalid">0</span></div>
</div>

<div class="controls">
  <button id="startBtn">▶ Start</button>
<button id="stopBtn">⏹ Stop</button>
<button id="modeBtn">➕ Add</button>
</div>


<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// -------------------- FIREBASE --------------------
const firebaseConfig = {
  apiKey: "AIzaSyBm1iZ3twTkqf4sxwKunm9v7dQ4L6o1ZFM",
  authDomain: "barcode-scanner-ca39c.firebaseapp.com",
  projectId: "barcode-scanner-ca39c",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// -------------------- UI --------------------
const video = document.getElementById("video");
const resultDiv = document.getElementById("result");
const statusDiv = document.getElementById("status");

const startBtn = document.getElementById("startBtn");
const stopBtn = document.getElementById("stopBtn");

// counters
let acceptedCount = 0;
let usedCount = 0;
let invalidCount = 0;

const acceptedEl = document.getElementById("accepted");
const usedEl = document.getElementById("used");
const invalidEl = document.getElementById("invalid");

// state
let stream;
let detector;
let scanning = false;

// -------------------- BUTTONS --------------------
startBtn.onclick = () => {
  if (!scanning) {
    scanning = true;
    init();
    statusDiv.textContent = "Scanner started";
  }
};

stopBtn.onclick = () => {
  scanning = false;
  if (stream) stream.getTracks().forEach(t => t.stop());
  statusDiv.textContent = "Scanner stopped";
};

// -------------------- SUPPORT CHECK --------------------
if (!("BarcodeDetector" in window)) {
  resultDiv.textContent = "BarcodeDetector NOT supported";
  statusDiv.textContent = "Use Chrome or Edge";
}

// -------------------- INIT --------------------
async function init() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "environment" }
    });

    video.srcObject = stream;
    await video.play();

    detector = new BarcodeDetector({
      formats: ["ean_13","ean_8","upc_a","upc_e","code_128","code_39","itf"]
    });

    scanLoop();

  } catch (err) {
    console.error(err);
    resultDiv.textContent = "Camera error";
  }
}

// -------------------- SCAN LOOP --------------------
async function scanLoop() {
  if (!scanning) return;

  try {
    if (video.readyState === video.HAVE_ENOUGH_DATA) {
      const barcodes = await detector.detect(video);

      if (barcodes.length > 0) {
        const value = barcodes[0].rawValue;

        resultDiv.textContent = "Checking: " + value;
        await checkCode(value);

        // pause briefly before next scan
        scanning = false;

        setTimeout(() => {
          resultDiv.textContent = "Ready...";
          scanning = true;
          scanLoop();
        }, 1500);

        return;
      }
    }
  } catch (err) {
    console.error(err);
  }

  requestAnimationFrame(scanLoop);
}

// -------------------- FIREBASE CHECK --------------------
async function checkCode(code) {
  
  try {
    const codeRef = doc(db, "codes", code);
    const docSnap = await getDoc(codeRef);
    if (navigator.vibrate) navigator.vibrate(100);

    if (!docSnap.exists()) {
      invalidCount++;
      invalidEl.textContent = invalidCount;

      resultDiv.textContent = "❌ Not invited";
      document.body.style.background = "#7f1d1d";
    } 
    else if (docSnap.data().used) {
      usedCount++;
      usedEl.textContent = usedCount;

      resultDiv.textContent = "⚠️ Already used";
      document.body.style.background = "#78350f";
    } 
    else {
      await updateDoc(codeRef, { used: true });

      acceptedCount++;
      acceptedEl.textContent = acceptedCount;

      resultDiv.textContent = "✅ Accepted";
      document.body.style.background = "#14532d";
    }

  } catch (err) {
    console.error(err);
    resultDiv.textContent = "Error";
  }
  setTimeout(() => {
  document.body.style.background = "black";
}, 200);
}
</script>

</body>
</html>
