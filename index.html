<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Native Barcode Scanner</title>
<style>
body {
  margin: 0;
  font-family: system-ui, -apple-system, Arial, sans-serif;
  background: #0b0b0f;
  color: white;
  padding-bottom: 90px;
  transition: background 0.4s ease;
  overflow-x: hidden;
}

/* subtle animated glow background layer */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at top, rgba(255,255,255,0.06), transparent 60%),
              radial-gradient(circle at bottom, rgba(255,255,255,0.04), transparent 60%);
  pointer-events: none;
}

/* TITLE */
h2 {
  text-align: center;
  margin: 14px 0;
  font-size: 1.4rem;
  font-weight: 600;
  letter-spacing: 0.5px;
}

/* CAMERA */
video {
  width: 100%;
  height: 52vh;
  object-fit: cover;
  border-radius: 18px;
  margin: 10px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.5);
}

/* RESULT CARD */
.card {
  text-align: center;
  font-size: 2rem;
  padding: 20px;
  margin: 10px;
  border-radius: 16px;

  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);

  box-shadow: 0 8px 30px rgba(0,0,0,0.35);

  transition: all 0.35s ease;
}

/* STATUS */
#status {
  text-align: center;
  opacity: 0.6;
  margin-bottom: 8px;
  font-size: 0.9rem;
}

/* STATS PANEL */
.stats {
  display: flex;
  justify-content: space-around;
  margin: 10px;
  padding: 12px;
  border-radius: 16px;

  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
}

.stat {
  font-size: 0.95rem;
  font-weight: 600;
}

/* SOFT STATUS COLORS (no harsh solid colors) */
.accepted { color: #4ade80; }
.used { color: #fbbf24; }
.invalid { color: #fb7185; }

/* BUTTON BAR */
.controls {
  position: fixed;
  bottom: 0;
  width: 100%;
  display: flex;
  gap: 6px;
  padding: 8px;
  background: rgba(10,10,15,0.7);
  backdrop-filter: blur(12px);
}

/* BUTTONS */
button {
  flex: 1;
  padding: 16px;
  font-size: 1rem;
  border: none;
  border-radius: 14px;
  font-weight: 600;
  transition: transform 0.15s ease, filter 0.2s ease;
}

/* press effect */
button:active {
  transform: scale(0.97);
  filter: brightness(0.9);
}

/* SOFT GRADIENT BUTTONS */
#startBtn {
  background: linear-gradient(135deg, #22c55e, #16a34a);
  color: black;
}

#stopBtn {
  background: linear-gradient(135deg, #ef4444, #b91c1c);
  color: white;
}

#modeBtn {
  background: linear-gradient(135deg, #60a5fa, #3b82f6);
  color: white;
}

/* SMOOTH BODY STATES (replace your JS colors with these classes if you want upgrade later) */
body.state-accepted {
  background: radial-gradient(circle at top, #14532d, #0b0b0f 60%);
}

body.state-used {
  background: radial-gradient(circle at top, #78350f, #0b0b0f 60%);
}

body.state-invalid {
  background: radial-gradient(circle at top, #7f1d1d, #0b0b0f 60%);
}
</style>
</head>

<body>

<h2>🎟 Barcode Scanner</h2>




<video id="video" autoplay></video>

<div id="result" class="card">Waiting...</div>
<div id="status"></div>

<div class="stats">
  <div class="stat accepted">✅ Accepted: <span id="accepted">0</span></div>
  <div class="stat used">⚠️ Used: <span id="used">0</span></div>
  <div class="stat invalid">❌ Not invited: <span id="invalid">0</span></div>
</div>

<div class="controls">
  <button id="startBtn">▶ Start</button>
<button id="stopBtn">⏹ Stop</button>
<button id="modeBtn">➕ Add</button>
</div>


<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// -------------------- FIREBASE --------------------
const firebaseConfig = {
  apiKey: "AIzaSyBm1iZ3twTkqf4sxwKunm9v7dQ4L6o1ZFM",
  authDomain: "barcode-scanner-ca39c.firebaseapp.com",
  projectId: "barcode-scanner-ca39c",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// -------------------- UI --------------------
const video = document.getElementById("video");
const resultDiv = document.getElementById("result");
const statusDiv = document.getElementById("status");

const startBtn = document.getElementById("startBtn");
const stopBtn = document.getElementById("stopBtn");

// counters
let acceptedCount = 0;
let usedCount = 0;
let invalidCount = 0;

const acceptedEl = document.getElementById("accepted");
const usedEl = document.getElementById("used");
const invalidEl = document.getElementById("invalid");

// state
let stream;
let detector;
let scanning = false;

// -------------------- BUTTONS --------------------
startBtn.onclick = () => {
  if (!scanning) {
    scanning = true;
    init();
    statusDiv.textContent = "Scanner started";
  }
};

stopBtn.onclick = () => {
  scanning = false;
  if (stream) stream.getTracks().forEach(t => t.stop());
  statusDiv.textContent = "Scanner stopped";
};

// -------------------- SUPPORT CHECK --------------------
if (!("BarcodeDetector" in window)) {
  resultDiv.textContent = "BarcodeDetector NOT supported";
  statusDiv.textContent = "Use Chrome or Edge";
}

// -------------------- INIT --------------------
async function init() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "environment" }
    });

    video.srcObject = stream;
    await video.play();

    detector = new BarcodeDetector({
      formats: ["ean_13","ean_8","upc_a","upc_e","code_128","code_39","itf"]
    });

    scanLoop();

  } catch (err) {
    console.error(err);
    resultDiv.textContent = "Camera error";
  }
}

// -------------------- SCAN LOOP --------------------
async function scanLoop() {
  if (!scanning) return;

  try {
    if (video.readyState === video.HAVE_ENOUGH_DATA) {
      const barcodes = await detector.detect(video);

      if (barcodes.length > 0) {
        const value = barcodes[0].rawValue;

        resultDiv.textContent = "Checking: " + value;
        await checkCode(value);

        // pause briefly before next scan
        scanning = false;

        setTimeout(() => {
          resultDiv.textContent = "Ready...";
          scanning = true;
          scanLoop();
        }, 1500);

        return;
      }
    }
  } catch (err) {
    console.error(err);
  }

  requestAnimationFrame(scanLoop);
}

// -------------------- FIREBASE CHECK --------------------
async function checkCode(code) {
  
  try {
    const codeRef = doc(db, "codes", code);
    const docSnap = await getDoc(codeRef);
    if (navigator.vibrate) navigator.vibrate(100);

    if (!docSnap.exists()) {
      invalidCount++;
      invalidEl.textContent = invalidCount;

      resultDiv.textContent = "❌ Not invited";
      document.body.className = "state-accepted";
    } 
    else if (docSnap.data().used) {
      usedCount++;
      usedEl.textContent = usedCount;

      resultDiv.textContent = "⚠️ Already used";
      document.body.className = "state-accepted";
    } 
    else {
      await updateDoc(codeRef, { used: true });

      acceptedCount++;
      acceptedEl.textContent = acceptedCount;

      resultDiv.textContent = "✅ Accepted";
      document.body.className = "state-accepted";
    }

  } catch (err) {
    console.error(err);
    resultDiv.textContent = "Error";
  }
  setTimeout(() => {
    document.body.className = "";
  }, 400);
}
</script>

</body>
</html>
